<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Agent Org Chart</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">OpenClaw</p>
        <h1 id="title">Agent Org Chart</h1>
        <p id="subtitle" class="subtitle"></p>
        <p class="hint">Hover cards for detail</p>
      </header>
      <section id="chart" class="chart"></section>
      <aside id="hover-panel" class="hover-panel" aria-live="polite">
        <p class="hover-panel__label">Hover detail</p>
        <h2 id="hover-name">OpenClaw Agent Org Chart</h2>
        <p id="hover-role" class="hover-panel__role">Move over a card to inspect an agent.</p>
        <p id="hover-summary" class="hover-panel__summary">Details about the selected node will appear here.</p>
        <p id="hover-meta" class="hover-panel__meta"></p>
      </aside>
    </main>
    <script src="script.js"></script>
  </body>
</html>
